<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Vasos Térmicos | Grabado Láser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .agotado { filter: grayscale(1); opacity: 0.6; }
        .badge-agotado { background: #ef4444; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; position: absolute; top: 10px; right: 10px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">

    <header class="p-8 text-center border-b border-gray-800">
        <h1 class="text-4xl font-bold text-orange-500">VASOS PRO</h1>
        <p class="text-gray-400">Grabado Láser de Alta Precisión</p>
    </header>

    <main id="catalogo" class="p-6 grid grid-cols-1 md:grid-cols-3 gap-8">
        <p class="text-center col-span-full">Cargando catálogo...</p>
    </main>

<script>
    // 1. REEMPLAZA ESTE LINK por el tuyo de "Publicar en la Web" (formato CSV)
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRzHiWJNnKpPcOCZ6DlNONaI1xEo0BYJVUYn3hPMJFRBQVnZ98Tmzj36U9aEWR_TBlRVkGVwe3xyz8R/pub?gid=0&single=true&output=csv';

    async function cargarProductos() {
        try {
            const response = await fetch(SHEET_URL);
            if (!response.ok) throw new Error('No se pudo conectar con Sheets');
            
            const data = await response.text();
            // Limpiamos los datos para evitar errores de saltos de línea
            const filas = data.split(/\r?\n/).slice(1); 
            const contenedor = document.getElementById('catalogo');
            contenedor.innerHTML = '';

            filas.forEach(fila => {
                // Usamos una expresión regular para separar por comas ignorando comas dentro de comillas
                const columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if(columnas.length >= 5) {
                    let [id, nombre, precio, stock, imagen, desc] = columnas;
                    
                    // Limpiamos las comillas que a veces pone Sheets
                    nombre = nombre.replace(/"/g, "");
                    const isAgotado = parseInt(stock) <= 0;

                    contenedor.innerHTML += `
                        <div class="relative bg-gray-800 rounded-xl overflow-hidden shadow-lg border border-gray-700 ${isAgotado ? 'opacity-50 grayscale' : ''}">
                            ${isAgotado ? '<span class="absolute top-2 right-2 bg-red-600 text-white text-xs px-2 py-1 rounded">AGOTADO</span>' : ''}
                            <img src="${imagen.replace(/"/g, "")}" class="w-full h-48 object-cover">
                            <div class="p-4">
                                <h2 class="text-lg font-bold">${nombre}</h2>
                                <p class="text-gray-400 text-xs mb-3">${desc.replace(/"/g, "")}</p>
                                <div class="flex justify-between items-center">
                                    <span class="text-xl font-bold text-orange-400">$${precio}</span>
                                    <a href="https://wa.me/521XXXXXXXXXX?text=Cotizar-${nombre}" 
                                       class="bg-orange-600 text-white px-3 py-1 rounded text-sm ${isAgotado ? 'hidden' : ''}">
                                       Pedir
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
        } catch (error) {
            document.getElementById('catalogo').innerHTML = 
                `<p class="text-red-500 col-span-full">Error al cargar: Verifica que tu Sheet esté "Publicado en la web" como CSV.</p>`;
        }
    }

    cargarProductos();
</script>
</body>
</html>
