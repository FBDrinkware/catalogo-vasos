<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB DRINKWARE | Catálogo Premium de Vasos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .cart-float { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
        .producto-agotado { filter: grayscale(100%); opacity: 0.6; }
        /* Scrollbar estética */
        #lista-carrito::-webkit-scrollbar, #modal-imagen::-webkit-scrollbar { width: 4px; }
        #lista-carrito::-webkit-scrollbar-thumb, #modal-imagen::-webkit-scrollbar-thumb { background: #ea580c; border-radius: 10px; }
        input[type="checkbox"] { accent-color: #ea580c; }
        
        /* Animación suave para el visor de imagen */
        #modal-imagen { transition: opacity 0.3s ease, visibility 0.3s ease; opacity: 0; visibility: hidden; }
        #modal-imagen.show { opacity: 1; visibility: visible; }

        /* Estilos específicos para AGOTADO y ÚLTIMAS PIEZAS (NUEVO) */
        .overlay-agotado { position: absolute; inset: 0; bg-black/70; flex justify-center items-center; z-10; }
        .badge-ultimas { color: #ef4444; font-size: 10px; font-weight: 800; text-transform: uppercase; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 pb-24">

    <header class="p-6 text-center bg-gray-900 border-b border-orange-600/20 sticky top-0 z-50 backdrop-blur-md bg-opacity-80 relative">
        <h1 class="text-xl md:text-2xl font-black text-orange-500 tracking-tighter uppercase">
            Catálogo Premium | <span class="text-white">FB DRINKWARE</span>
        </h1>
        <div class="absolute bottom-[-1px] left-1/2 -translate-x-1/2 w-48 h-[2px] bg-orange-600 rounded-full"></div>
    </header>

    <main id="catalogo" class="p-4 md:p-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 max-w-7xl mx-auto pt-8">
        <div class="col-span-full text-center py-20 text-gray-700 animate-pulse font-mono text-xs uppercase tracking-widest">SINCRONIZANDO DATA DE FB DRINKWARE...</div>
    </main>

    <div class="cart-float">
        <button onclick="toggleCarrito()" class="bg-orange-600 hover:bg-orange-500 text-white p-5 rounded-full shadow-[0_0_25px_rgba(234,88,12,0.4)] flex items-center gap-3 transition-all transform hover:scale-110 active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
            <span id="cart-count" class="font-black text-2xl">0</span>
        </button>
    </div>

    <div id="modal-imagen" class="fixed inset-0 bg-black/98 z-[300] flex items-center justify-center p-4 backdrop-blur-sm cursor-zoom-out" onclick="cerrarImagen(event)">
        <button class="absolute top-6 right-6 text-white/70 hover:text-white z-50 bg-gray-900/50 p-2 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <img id="imagen-ampliada" src="" alt="Vista ampliada" class="max-w-full max-h-[90vh] rounded-2xl shadow-2xl border-2 border-gray-800 cursor-default" onclick="event.stopPropagation()">
    </div>

    <div id="modal-carrito" class="fixed inset-0 bg-black/95 hidden z-[200] p-4 flex items-center justify-center backdrop-blur-lg">
        <div class="bg-gray-900 w-full max-w-lg rounded-[2.5rem] p-6 md:p-8 border border-gray-800 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-black mb-6 text-orange-500 tracking-tighter uppercase italic border-b border-gray-800 pb-2">Resumen de Pedido</h2>
            
            <div id="lista-carrito" class="space-y-3 mb-6 pr-1 overflow-y-auto max-h-60"></div>

            <div class="bg-gray-800/40 p-5 md:p-6 rounded-3xl border border-gray-800 space-y-4 mb-6 shadow-inner">
                <div>
                    <label class="block text-[10px] text-gray-400 uppercase font-black mb-1">Código Postal</label>
                    <input type="text" id="form-cp" placeholder="Indispensable para envío" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:border-orange-500 outline-none transition-colors">
                </div>

                <div class="space-y-3 pt-2">
                    <div class="flex items-center gap-3 bg-gray-900/50 p-3 rounded-xl border border-gray-700 hover:border-gray-600 transition-colors cursor-pointer" onclick="document.getElementById('check-personalizar').click()">
                        <input type="checkbox" id="check-personalizar" class="w-5 h-5 rounded" onchange="togglePersonalizacion()" onclick="event.stopPropagation()">
                        <label for="check-personalizar" class="text-xs font-bold cursor-pointer">¿Deseas personalizar tus vasos?</label>
                    </div>

                    <div id="opciones-logo" class="hidden pl-4 space-y-2 border-l-2 border-orange-500/50">
                        <label class="flex items-center gap-2 text-[11px] text-gray-400 cursor-pointer hover:text-white transition-colors">
                            <input type="radio" name="logo-tipo" value="VECTOR" checked class="accent-orange-500"> Tengo logo vectorizado
                        </label>
                        <label class="flex items-center gap-2 text-[11px] text-gray-400 cursor-pointer hover:text-white transition-colors">
                            <input type="radio" name="logo-tipo" value="IMAGEN" class="accent-orange-500"> Tengo solo una idea/imagen
                        </label>
                    </div>

                    <div class="flex items-center gap-3 bg-gray-900/50 p-3 rounded-xl border border-gray-700 hover:border-gray-600 transition-colors cursor-pointer" onclick="document.getElementById('check-nombres').click()">
                        <input type="checkbox" id="check-nombres" class="w-5 h-5 rounded" onclick="event.stopPropagation()">
                        <label for="check-nombres" class="text-xs font-bold cursor-pointer">Agregar nombres individuales</label>
                    </div>
                </div>
            </div>

            <button onclick="enviarWhatsApp()" class="w-full bg-green-600 hover:bg-green-500 text-white font-black py-5 rounded-2xl shadow-lg flex justify-center items-center gap-3 text-lg uppercase tracking-tight transition-all transform active:scale-95">
                Generar Pedido por WhatsApp
            </button>
            <button onclick="toggleCarrito()" class="w-full text-gray-600 text-[10px] font-black uppercase tracking-widest mt-4 hover:text-white transition-colors">Seguir comprando</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE DATOS FIJOS
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRzHiWJNnKpPcOCZ6DlNONaI1xEo0BYJVUYn3hPMJFRBQVnZ98Tmzj36U9aEWR_TBlRVkGVwe3xyz8R/pub?gid=0&single=true&output=csv';
        const WHATSAPP_NUM = '5219983210480';
        let carrito = [];

        async function cargarProductos() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const filas = data.split(/\r?\n/).slice(1); 
                const contenedor = document.getElementById('catalogo');
                contenedor.innerHTML = '';

                filas.forEach(fila => {
                    const col = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(col.length < 5) return;
                    // A:SKU, B:Nombre, C:Precio, D:Imagen, E:Descripción, F:Estatus
                    let [sku, nombre, precio, imagenUrl, desc, estatusRaw] = col.map(s => s.replace(/"/g, "").trim());
                    const estatus = estatusRaw || "";
                    
                    // --- LÓGICA DE ESTATUS (NUEVO) ---
                    const isAgotado = estatus.toLowerCase().includes("agotado");
                    const isUltimas = estatus.toLowerCase().includes("últimas") || estatus.toLowerCase().includes("ultimas");

                    let overlayAgotadoHTML = "";
                    let badgeUltimasHTML = "";
                    let clasesTarjeta = "";

                    if (isAgotado) {
                        // REQUERIMIENTO: Texto AGOTADO en medio de la imagen
                        overlayAgotadoHTML = `<div class="absolute inset-0 bg-black/70 flex justify-center items-center z-10 p-2">
                                                 <span class="text-white text-xl md:text-2xl font-black uppercase tracking-tighter text-center">¡AGOTADO!</span>
                                              </div>`;
                        clasesTarjeta = "producto-agotado";
                    } else if (isUltimas) {
                        // REQUERIMIENTO: Últimas piezas debajo del nombre, en rojo
                        badgeUltimasHTML = `<p class="badge-ultimas mt-1">⚠️ Últimas piezas</p>`;
                    }

                    contenedor.innerHTML += `
                        <div class="group relative bg-gray-900 border border-gray-800 rounded-3xl overflow-hidden flex flex-col transition-all hover:border-gray-700 hover:shadow-2xl ${clasesTarjeta}">
                            <div class="h-44 md:h-56 bg-gray-800 overflow-hidden relative ${!isAgotado ? 'cursor-zoom-in' : ''}" onclick="${!isAgotado ? `abrirImagen('${imagenUrl}', '${nombre}')` : ''}">
                                ${overlayAgotadoHTML}
                                <img src="${imagenUrl}" alt="${nombre}" onerror="this.src='https://via.placeholder.com/400?text=FB+Drinkware'" class="w-full h-full object-cover transform transition-transform duration-500 ${!isAgotado ? 'group-hover:scale-110' : ''}">
                                
                                ${!isAgotado ? `<div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white/90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
                                    </svg>
                                </div>` : ''}
                            </div>
                            
                            <div class="p-4 md:p-5 flex-grow flex flex-col border-t border-gray-800/50">
                                <span class="text-[8px] md:text-[9px] font-mono text-orange-600 font-bold uppercase tracking-widest">${sku}</span>
                                <h3 class="font-bold text-xs md:text-sm text-white uppercase italic mb-1 leading-tight">${nombre}</h3>
                                
                                ${badgeUltimasHTML} <div class="flex items-center justify-between mt-auto pt-3 md:pt-4">
                                    <span class="text-lg md:text-xl font-black text-white">$${precio}</span>
                                    <button onclick="agregar('${sku}', '${nombre}')" class="bg-white text-black text-[9px] md:text-[10px] font-black px-3 py-1.5 rounded-xl hover:bg-orange-500 hover:text-white transition-all transform active:scale-95 ${isAgotado ? 'hidden' : ''}">+ AÑADIR</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) { console.error(e); }
        }

        // --- VISOR DE IMAGEN ---
        function abrirImagen(url, nombre) {
            const modal = document.getElementById('modal-imagen');
            const imgAmpliada = document.getElementById('imagen-ampliada');
            imgAmpliada.src = url;
            imgAmpliada.alt = "Vista ampliada de " + nombre;
            modal.classList.add('show');
            document.body.style.overflow = 'hidden'; 
        }

        function cerrarImagen(event) {
            document.getElementById('modal-imagen').classList.remove('show');
            document.body.style.overflow = ''; 
        }
        
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') cerrarImagen();
        });

        // --- CARRITO ---
        function agregar(sku, nombre) {
            const index = carrito.findIndex(i => i.sku === sku);
            if(index > -1) { carrito[index].cant++; } else { carrito.push({sku, nombre, cant: 1}); }
            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            document.getElementById('cart-count').innerText = carrito.reduce((sum, i) => sum + i.cant, 0);
            const lista = document.getElementById('lista-carrito');
            lista.innerHTML = carrito.length === 0 ? '<p class="text-center py-8 text-gray-500 text-xs font-medium uppercase tracking-widest">PEDIDO VACÍO</p>' : '';
            carrito.forEach((item, index) => {
                lista.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-800/40 p-3 rounded-2xl border border-gray-800 text-xs shadow-inner">
                        <div class="font-bold text-[11px]"> <span class="text-orange-500 font-mono">${item.sku}</span> - ${item.nombre} </div>
                        <div class="flex items-center gap-3">
                            <span class="bg-orange-600 px-2.5 rounded font-black text-[10px] text-white">x${item.cant}</span>
                            <button onclick="eliminar(${index})" class="text-gray-600 hover:text-red-500 transition-colors">✕</button>
                        </div>
                    </div>
                `;
            });
        }

        function eliminar(index) { carrito.splice(index, 1); actualizarInterfaz(); }
        function toggleCarrito() { document.getElementById('modal-carrito').classList.toggle('hidden'); }
        function togglePersonalizacion() { document.getElementById('opciones-logo').style.display = document.getElementById('check-personalizar').checked ? 'block' : 'none'; }

        function enviarWhatsApp() {
            if(carrito.length === 0) return alert("Añade productos primero.");
            const cp = document.getElementById('form-cp').value;
            if(!cp) return alert("Ingresa tu Código Postal para cotizar envío.");

            const personalizar = document.getElementById('check-personalizar').checked;
            const logo = document.querySelector('input[name="logo-tipo"]:checked').value;
            const nombres = document.getElementById('check-nombres').checked;

            let mensaje = "🚀 *NUEVO PEDIDO: FB DRINKWARE* 🚀\n";
            mensaje += "📍 *CP:* " + cp + "\n\n";
            
            mensaje += "*DETALLE DE PRODUCTOS:* \n";
            mensaje += "```\n";
            mensaje += "SKU           | CANT | PRODUCTO\n";
            mensaje += "--------------------------------\n";
            
            carrito.forEach(item => {
                let skuCol = item.sku.padEnd(13, ' ');
                let cantCol = item.cant.toString().padStart(4, ' ');
                mensaje += `${skuCol} | ${cantCol} | ${item.nombre}\n`;
            });
            mensaje += "```\n\n";

            mensaje += "✨ *PERSONALIZACIÓN:*\n";
            mensaje += "• Requiere Grabado: " + (personalizar ? "SÍ ✅" : "NO ❌") + "\n";
            if(personalizar) mensaje += "• Tipo de Logo: " + logo + "\n";
            mensaje += "• Agregar Nombres: " + (nombres ? "SÍ ✅" : "NO ❌") + "\n";
            
            const url = `https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }

        cargarProductos();
    </script>
</body>
</html>
