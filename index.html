<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Vasos Personalizados FB DRINKWARE 2026 | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cart-float { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
        .agotado { filter: grayscale(1); opacity: 0.6; }
        /* Animación suave para las tarjetas */
        .card-transition { transition: all 0.3s ease; }
        .card-transition:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 pb-24 font-sans">

    <header class="p-8 text-center bg-gray-900 border-b border-orange-900/20 shadow-2xl">
        <h1 class="text-4xl font-black text-orange-500 tracking-tighter uppercase">
            Vasos <span class="text-white">Pro</span>
        </h1>
        <p class="text-gray-400 text-xs mt-2 tracking-widest uppercase">Contamos con Grabado Láser Personalizado</p>
    </header>

    <main id="catalogo" class="p-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 max-w-7xl mx-auto">
        <div class="col-span-full text-center py-20 text-gray-500 italic">Cargando catálogo premium...</div>
    </main>

    <div class="cart-float">
        <button onclick="toggleCarrito()" class="bg-orange-600 hover:bg-orange-500 text-white p-5 rounded-full shadow-2xl flex items-center gap-3 transition-all transform hover:scale-110 active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <span id="cart-count" class="font-black text-lg">0</span>
        </button>
    </div>

    <div id="modal-carrito" class="fixed inset-0 bg-black/90 hidden z-[200] p-4 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-gray-900 w-full max-w-md rounded-3xl p-8 border border-gray-800 shadow-2xl">
            <h2 class="text-3xl font-bold mb-6 text-white">Tu <span class="text-orange-500">Cotización</span></h2>
            <div id="lista-carrito" class="max-h-80 overflow-y-auto mb-8 space-y-4 pr-2 text-sm">
                </div>
            <div class="space-y-4">
                <button onclick="enviarWhatsApp()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex justify-center items-center gap-2">
                    Enviar a WhatsApp
                </button>
                <button onclick="toggleCarrito()" class="w-full text-gray-500 text-sm font-medium">Continuar viendo</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN: Pega aquí tu link de Sheets (Publicado como CSV)
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRzHiWJNnKpPcOCZ6DlNONaI1xEo0BYJVUYn3hPMJFRBQVnZ98Tmzj36U9aEWR_TBlRVkGVwe3xyz8R/pub?gid=0&single=true&output=csv';
        
        let carrito = [];

        async function cargarProductos() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                // Separamos por filas y limpiamos espacios
                const filas = data.split(/\r?\n/).slice(1); 
                const contenedor = document.getElementById('catalogo');
                contenedor.innerHTML = '';

                filas.forEach(fila => {
                    // Expresión regular para separar por comas respetando comas internas en textos
                    const col = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(col.length < 5) return;

                    // MAPEADO DE COLUMNAS: A:SKU, B:Nombre, C:Precio, D:Imagen, E:Desc, F:Estatus
                    const [sku, nombre, precio, imagen, desc, estatusRaw] = col.map(s => s.replace(/"/g, "").trim());
                    
                    const estatus = estatusRaw || ""; // Si está vacío, queda blanco
                    const isAgotado = estatus.toLowerCase().includes("agotado");
                    const isUltimas = estatus.toLowerCase().includes("últimas piezas") || estatus.toLowerCase().includes("ultimas piezas");

                    // Lógica visual del Badge
                    let badgeHTML = "";
                    if (isAgotado) {
                        badgeHTML = `<span class="absolute top-3 right-3 bg-red-600 text-white text-[10px] font-black px-2 py-1 rounded-md uppercase tracking-tighter z-10">Agotado</span>`;
                    } else if (isUltimas) {
                        badgeHTML = `<span class="absolute top-3 right-3 bg-orange-500 text-white text-[10px] font-black px-2 py-1 rounded-md uppercase tracking-tighter z-10 animate-pulse">Últimas Piezas</span>`;
                    }

                    contenedor.innerHTML += `
                        <div class="card-transition relative bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden flex flex-col shadow-lg ${isAgotado ? 'agotado' : ''}">
                            ${badgeHTML}
                            <div class="h-44 overflow-hidden">
                                <img src="${imagen}" alt="${nombre}" class="w-full h-full object-cover transform hover:scale-110 transition-transform duration-500">
                            </div>
                            <div class="p-4 flex-grow flex flex-col">
                                <span class="text-[9px] font-mono text-gray-500 mb-1 tracking-widest">REF: ${sku}</span>
                                <h3 class="font-bold text-base text-white leading-tight mb-1 uppercase">${nombre}</h3>
                                <p class="text-[11px] text-gray-400 mb-4 flex-grow line-clamp-2">${desc}</p>
                                <div class="flex items-center justify-between mt-auto">
                                    <span class="text-xl font-black text-white">$${precio}</span>
                                    <button onclick="agregar('${sku}', '${nombre}')" 
                                        class="bg-orange-600 text-white text-[11px] font-black px-4 py-2 rounded-xl hover:bg-white hover:text-black transition-colors ${isAgotado ? 'hidden' : ''}">
                                        AÑADIR
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error("Error al leer Sheets:", e);
                document.getElementById('catalogo').innerHTML = `<p class="col-span-full text-center text-red-500">Error de conexión con el inventario.</p>`;
            }
        }

        function agregar(sku, nombre) {
            const index = carrito.findIndex(i => i.sku === sku);
            if(index > -1) {
                carrito[index].cant++;
            } else {
                carrito.push({sku, nombre, cant: 1});
            }
            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            document.getElementById('cart-count').innerText = carrito.reduce((sum, i) => sum + i.cant, 0);
            const lista = document.getElementById('lista-carrito');
            lista.innerHTML = carrito.length === 0 ? '<p class="text-gray-500 text-center py-4">No has seleccionado vasos aún.</p>' : '';
            
            carrito.forEach((item, index) => {
                lista.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-800/50 p-4 rounded-2xl border border-gray-700">
                        <div>
                            <p class="font-bold text-white text-base">${item.nombre}</p>
                            <p class="text-[10px] text-orange-500 font-mono">SKU: ${item.sku}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-white font-bold bg-gray-700 px-3 py-1 rounded-lg">x${item.cant}</span>
                            <button onclick="eliminar(${index})" class="text-red-500 hover:text-white transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function eliminar(index) {
            carrito.splice(index, 1);
            actualizarInterfaz();
        }

        function toggleCarrito() {
            document.getElementById('modal-carrito').classList.toggle('hidden');
        }

        function enviarWhatsApp() {
            if(carrito.length === 0) return alert("Selecciona al menos un vaso para cotizar.");
            
            let mensaje = "🔥 *NUEVA COTIZACIÓN - VASOS PRO* 🔥\n\n";
            mensaje += "Hola, me interesa personalizar los siguientes productos:\n\n";
            
            carrito.forEach(item => {
                mensaje += `✅ *SKU:* ${item.sku}\n`;
                mensaje += `   *Vaso:* ${item.nombre}\n`;
                mensaje += `   *Cantidad:* ${item.cant}\n`;
                mensaje += `   --------------------------\n`;
            });

            mensaje += "\n¿Podrían darme el precio total y tiempo de entrega?";
            
            // REEMPLAZA TU_NUMERO AQUÍ (Ej: 5215512345678)
            const url = `https://wa.me/5219983210480?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }

        cargarProductos();
    </script>
</body>
</html>
