<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB DRINKWARE | Catálogo de Vasos Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .cart-float { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
        .agotado { filter: grayscale(1); opacity: 0.5; }
        .card-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-transition:hover { transform: translateY(-8px); shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        #lista-carrito::-webkit-scrollbar { width: 4px; }
        #lista-carrito::-webkit-scrollbar-thumb { background: #ea580c; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 pb-24 sans-serif">

    <header class="p-8 text-center bg-gray-900 border-b border-orange-600/20 sticky top-0 z-50 backdrop-blur-md bg-opacity-80">
        <h1 class="text-2xl md:text-3xl font-black text-orange-500 tracking-tighter uppercase">
            Catálogo de Vasos Premium | <span class="text-white">FB DRINKWARE</span>
        </h1>
        <p class="text-gray-400 text-xs tracking-widest uppercase mt-2 font-semibold">
            Contamos con Personalización Láser
        </p>
    </header>

    <main id="catalogo" class="p-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 max-w-7xl mx-auto pt-10">
        <div class="col-span-full text-center py-20 text-gray-600 animate-pulse font-mono tracking-widest text-sm">
            SINCRONIZANDO INVENTARIO CON FB DRINKWARE...
        </div>
    </main>

    <div class="cart-float">
        <button onclick="toggleCarrito()" class="bg-orange-600 hover:bg-orange-500 text-white p-5 rounded-full shadow-[0_0_25px_rgba(234,88,12,0.4)] flex items-center gap-3 transition-all transform hover:scale-110 active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
            <span id="cart-count" class="font-black text-2xl">0</span>
        </button>
    </div>

    <div id="modal-carrito" class="fixed inset-0 bg-black/95 hidden z-[200] p-4 flex items-center justify-center backdrop-blur-lg">
        <div class="bg-gray-900 w-full max-w-md rounded-[2.5rem] p-8 border border-gray-800 shadow-2xl relative">
            <h2 class="text-3xl font-black mb-6 text-white tracking-tighter">MI <span class="text-orange-500">PEDIDO</span></h2>
            
            <div id="lista-carrito" class="max-h-[50vh] overflow-y-auto mb-8 space-y-4 pr-2">
                </div>

            <div class="space-y-4">
                <button onclick="enviarWhatsApp()" class="w-full bg-green-600 hover:bg-green-500 text-white font-black py-5 rounded-2xl transition-all shadow-lg flex justify-center items-center gap-3 text-lg uppercase tracking-tight">
                    Confirmar por WhatsApp
                </button>
                <button onclick="toggleCarrito()" class="w-full text-gray-600 text-xs font-bold uppercase tracking-widest">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        // DATOS FIJOS PROPORCIONADOS
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRzHiWJNnKpPcOCZ6DlNONaI1xEo0BYJVUYn3hPMJFRBQVnZ98Tmzj36U9aEWR_TBlRVkGVwe3xyz8R/pub?gid=0&single=true&output=csv';
        const WHATSAPP_NUM = '5219983210480';
        
        let carrito = [];

        async function cargarProductos() {
            try {
                const response = await fetch(SHEET_URL);
                if(!response.ok) throw new Error("No se pudo conectar");
                const data = await response.text();
                const filas = data.split(/\r?\n/).slice(1); 
                const contenedor = document.getElementById('catalogo');
                contenedor.innerHTML = '';

                filas.forEach(fila => {
                    const col = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(col.length < 5) return;

                    // A:SKU, B:Nombre, C:Precio, D:Imagen(ImgBB), E:Descripción, F:Estatus
                    let [sku, nombre, precio, imagenUrl, desc, estatusRaw] = col.map(s => s.replace(/"/g, "").trim());
                    
                    const estatus = estatusRaw || "";
                    const isAgotado = estatus.toLowerCase().includes("agotado");
                    const isUltimas = estatus.toLowerCase().includes("últimas") || estatus.toLowerCase().includes("ultimas");

                    let badgeHTML = isAgotado ? `<span class="absolute top-3 right-3 bg-red-600 text-white text-[10px] font-black px-2 py-1 rounded-md z-10 uppercase tracking-wider">Agotado</span>` 
                                  : isUltimas ? `<span class="absolute top-3 right-3 bg-orange-500 text-white text-[10px] font-black px-2 py-1 rounded-md z-10 animate-pulse uppercase tracking-wider">Últimas</span>` 
                                  : "";

                    contenedor.innerHTML += `
                        <div class="card-transition relative bg-gray-900 border border-gray-800 rounded-3xl overflow-hidden flex flex-col shadow-lg ${isAgotado ? 'agotado' : ''}">
                            ${badgeHTML}
                            <div class="h-48 md:h-64 overflow-hidden bg-gray-800 flex items-center justify-center">
                                <img src="${imagenUrl}" 
                                     alt="${nombre}"
                                     onerror="this.src='https://via.placeholder.com/500x500/111827/ea580c?text=FB+Drinkware'"
                                     class="w-full h-full object-cover">
                            </div>
                            <div class="p-5 flex-grow flex flex-col">
                                <span class="text-[9px] font-mono text-orange-600 mb-1 font-bold uppercase tracking-widest">${sku}</span>
                                <h3 class="font-extrabold text-sm md:text-base text-white leading-tight mb-2 uppercase italic">${nombre}</h3>
                                <p class="text-[10px] text-gray-500 mb-4 flex-grow line-clamp-2">${desc}</p>
                                <div class="flex items-center justify-between mt-auto">
                                    <span class="text-2xl font-black text-white">$${precio}</span>
                                    <button onclick="agregar('${sku}', '${nombre}')" 
                                        class="bg-white text-black text-[11px] font-black px-5 py-2.5 rounded-xl hover:bg-orange-500 hover:text-white transition-all transform active:scale-90 ${isAgotado ? 'hidden' : ''}">
                                        AÑADIR
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error(e);
                document.getElementById('catalogo').innerHTML = `<p class="col-span-full text-center text-red-500 font-bold py-20">ERROR DE CONEXIÓN CON EL INVENTARIO</p>`;
            }
        }

        function agregar(sku, nombre) {
            const index = carrito.findIndex(i => i.sku === sku);
            if(index > -1) {
                carrito[index].cant++;
            } else {
                carrito.push({sku, nombre, cant: 1});
            }
            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            document.getElementById('cart-count').innerText = carrito.reduce((sum, i) => sum + i.cant, 0);
            const lista = document.getElementById('lista-carrito');
            lista.innerHTML = carrito.length === 0 ? '<p class="text-gray-500 text-center py-10 font-medium">TU PEDIDO ESTÁ VACÍO</p>' : '';
            
            carrito.forEach((item, index) => {
                lista.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-800/40 p-4 rounded-2xl border border-gray-800">
                        <div>
                            <p class="font-black text-white text-xs uppercase tracking-tight">${item.nombre}</p>
                            <p class="text-[9px] text-orange-500 font-mono font-bold">${item.sku}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-white font-black bg-orange-600 px-3 py-1 rounded-lg text-xs">x${item.cant}</span>
                            <button onclick="eliminar(${index})" class="text-gray-600 hover:text-red-500 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function eliminar(index) {
            carrito.splice(index, 1);
            actualizarInterfaz();
        }

        function toggleCarrito() {
            document.getElementById('modal-carrito').classList.toggle('hidden');
        }

        function enviarWhatsApp() {
            if(carrito.length === 0) return alert("Añade productos para cotizar.");
            
            let mensaje = "🚀 NUEVA COTIZACIÓN - FB DRINKWARE 🚀\n";
            mensaje += "--------------------------------------\n";
            mensaje += "Hola, me interesa personalizar:\n\n";
            
            carrito.forEach(item => {
                mensaje += `✅ SKU: ${item.sku}\n`;
                mensaje += `   MODELO: ${item.nombre}\n`;
                mensaje += `   CANTIDAD: ${item.cant}\n`;
                mensaje += `   --------------------------\n`;
            });

            mensaje += "\n¿Cuál sería el precio total y tiempo de entrega?";
            
            const url = `https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }

        cargarProductos();
    </script>
</body>
</html>
