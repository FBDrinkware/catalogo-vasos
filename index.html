<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB DRINKWARE | Catálogo Premium 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fb: {
                            dark: '#184273',
                            mid: '#566876',
                            silver: '#b1afaf',
                            light: '#bcbbba',
                            cream: '#f1f0f0',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .cart-float { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
        .producto-agotado { filter: grayscale(100%); opacity: 0.6; }
        #lista-carrito::-webkit-scrollbar { width: 4px; }
        #lista-carrito::-webkit-scrollbar-thumb { background: #184273; border-radius: 10px; }
        input[type="checkbox"], input[type="radio"] { accent-color: #184273; }
        #modal-imagen { transition: opacity 0.3s ease, visibility 0.3s ease; opacity: 0; visibility: hidden; }
        #modal-imagen.show { opacity: 1; visibility: visible; }
        .badge-ultimas { color: #ef4444; font-size: 10px; font-weight: 800; text-transform: uppercase; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .oferta-tag {
            position: absolute; bottom: 12px; left: 12px; background-color: #184273; color: white;
            padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 900; text-transform: uppercase;
            z-index: 20; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); pointer-events: none;
        }
        .badge-3d {
            position: absolute; top: 10px; right: 10px; background: linear-gradient(135deg, #184273, #566876);
            color: white; padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; text-transform: uppercase;
            z-index: 20; box-shadow: 0 2px 8px rgba(24,66,115,0.5); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            display: flex; align-items: center; gap: 4px;
        }
        .badge-3d:hover { transform: scale(1.1); box-shadow: 0 4px 12px rgba(24,66,115,0.7); }
        .aviso-factura {
            background: linear-gradient(135deg, rgba(24,66,115,0.1), rgba(24,66,115,0.05));
            border: 1px solid rgba(24,66,115,0.3); border-radius: 12px; padding: 12px;
            font-size: 11px; color: #566876; line-height: 1.5;
        }
        .aviso-factura strong { color: #184273; }
        .cant-input {
            width: 48px; text-align: center; background: #184273; color: white;
            border: none; border-radius: 8px; font-weight: 900; font-size: 11px; padding: 4px 2px;
            -moz-appearance: textfield;
        }
        .cant-input::-webkit-outer-spin-button, .cant-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .cant-input:focus { outline: 2px solid #566876; outline-offset: 1px; }
        .chip-filtro {
            padding: 6px 16px; border-radius: 20px; font-size: 11px; font-weight: 700;
            text-transform: uppercase; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; user-select: none; white-space: nowrap;
        }
        .chip-filtro.inactive { background: white; color: #566876; border-color: #bcbbba; }
        .chip-filtro.inactive:hover { border-color: #184273; color: #184273; }
        .chip-filtro.active { background: #184273; color: white; border-color: #184273; }
    </style>
</head>
<body class="bg-fb-cream text-fb-dark pb-24">

    <header class="p-6 text-center bg-white border-b border-fb-light/50 sticky top-0 z-50 backdrop-blur-md bg-opacity-90 shadow-sm">
        <h1 class="text-xl md:text-2xl font-black tracking-tighter uppercase">
            <span class="text-fb-dark">Catálogo Premium</span> | <span class="text-fb-mid">FB DRINKWARE</span>
        </h1>
        <div class="absolute bottom-[-1px] left-1/2 -translate-x-1/2 w-48 h-[2px] bg-fb-dark rounded-full"></div>
    </header>

    <div id="filtros-oz" class="sticky top-[73px] z-40 bg-fb-cream/95 backdrop-blur-sm border-b border-fb-light/30 px-4 py-3">
        <div class="flex gap-2 overflow-x-auto max-w-7xl mx-auto items-center" id="contenedor-chips">
            <span class="text-[10px] font-black text-fb-mid uppercase tracking-widest whitespace-nowrap mr-1">Filtrar:</span>
            <button class="chip-filtro active" data-oz="todos" onclick="toggleFiltro(this)">Todos</button>
        </div>
    </div>

    <main id="catalogo" class="p-4 md:p-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 max-w-7xl mx-auto pt-4">
        <div class="col-span-full text-center py-20 text-fb-silver animate-pulse font-mono text-xs uppercase tracking-widest">SINCRONIZANDO INVENTARIO...</div>
    </main>

    <div class="cart-float">
        <button onclick="toggleCarrito()" class="bg-fb-dark hover:bg-fb-mid text-white p-5 rounded-full shadow-lg flex items-center gap-3 transition-all transform hover:scale-110 active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
            <span id="cart-count" class="font-black text-2xl">0</span>
        </button>
    </div>

    <div id="modal-imagen" class="fixed inset-0 bg-black/95 z-[300] flex items-center justify-center p-4 backdrop-blur-sm cursor-zoom-out" onclick="cerrarImagen()">
        <button class="absolute top-6 right-6 text-white/70 hover:text-white z-50 bg-gray-900/50 p-2 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
        <img id="imagen-ampliada" src="" alt="" class="max-w-full max-h-[90vh] rounded-2xl shadow-2xl border-2 border-gray-700" onclick="event.stopPropagation()">
    </div>

    <div id="modal-carrito" class="fixed inset-0 bg-black/90 hidden z-[200] p-4 flex items-center justify-center backdrop-blur-lg">
        <div class="bg-white w-full max-w-lg rounded-[2rem] p-6 md:p-8 border border-fb-light shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-black mb-6 text-fb-dark tracking-tighter uppercase italic border-b border-fb-light pb-2">Tu Pedido</h2>
            <div id="lista-carrito" class="space-y-3 mb-4 pr-1 overflow-y-auto max-h-60"></div>
            <div id="subtotal-container" class="hidden mb-6 p-4 bg-fb-cream rounded-2xl border border-fb-light">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-black text-fb-mid uppercase tracking-widest">Subtotal estimado</span>
                    <span id="subtotal-monto" class="text-xl font-black text-fb-dark">$0</span>
                </div>
                <p class="text-[9px] text-fb-silver mt-1 uppercase tracking-wider">*No incluye personalización ni envío</p>
            </div>
            <div class="bg-fb-cream p-5 md:p-6 rounded-2xl border border-fb-light space-y-4 mb-6">
                <div>
                    <label class="block text-[10px] text-fb-mid uppercase font-black mb-1 ml-1 tracking-widest">Nombre completo</label>
                    <input type="text" id="form-nombre" placeholder="Ej: Juan Pérez" class="w-full bg-white border border-fb-light rounded-xl px-4 py-3 text-sm text-fb-dark focus:border-fb-dark outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[10px] text-fb-mid uppercase font-black mb-1 ml-1 tracking-widest">Teléfono de contacto</label>
                    <input type="tel" id="form-telefono" placeholder="Ej: 998 321 0480" class="w-full bg-white border border-fb-light rounded-xl px-4 py-3 text-sm text-fb-dark focus:border-fb-dark outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[10px] text-fb-mid uppercase font-black mb-1 ml-1 tracking-widest">Código Postal de Envío</label>
                    <input type="text" id="form-cp" placeholder="Ej: 77500" class="w-full bg-white border border-fb-light rounded-xl px-4 py-3 text-sm text-fb-dark focus:border-fb-dark outline-none transition-all">
                </div>
                <div class="space-y-3 pt-2">
                    <label class="flex items-center gap-3 bg-white p-3 rounded-xl border border-fb-light hover:border-fb-mid transition-colors cursor-pointer">
                        <input type="checkbox" id="check-personalizar" class="w-5 h-5 rounded" onchange="togglePersonalizacion()">
                        <span class="text-xs font-bold text-fb-dark">¿Deseas personalizar tus vasos?</span>
                    </label>
                    <div id="opciones-logo" class="hidden pl-4 space-y-2 border-l-2 border-fb-dark/30">
                        <label class="flex items-center gap-2 text-[11px] text-fb-mid cursor-pointer hover:text-fb-dark transition-colors">
                            <input type="radio" name="logo-tipo" value="VECTORIZADO" checked> Tengo logo vectorizado (.AI, .SVG)
                        </label>
                        <label class="flex items-center gap-2 text-[11px] text-fb-mid cursor-pointer hover:text-fb-dark transition-colors">
                            <input type="radio" name="logo-tipo" value="IDEA O IMAGEN"> Tengo solo una idea/imagen (.JPG, .PNG)
                        </label>
                    </div>
                    <label class="flex items-center gap-3 bg-white p-3 rounded-xl border border-fb-light hover:border-fb-mid transition-colors cursor-pointer">
                        <input type="checkbox" id="check-nombres" class="w-5 h-5 rounded">
                        <span class="text-xs font-bold text-fb-dark">Agregar nombres individuales</span>
                    </label>
                    <label class="flex items-center gap-3 bg-white p-3 rounded-xl border border-fb-light hover:border-fb-mid transition-colors cursor-pointer">
                        <input type="checkbox" id="check-factura" class="w-5 h-5 rounded" onchange="toggleFactura()">
                        <span class="text-xs font-bold text-fb-dark">Requiero factura</span>
                    </label>
                    <div id="aviso-factura" class="hidden pl-4 border-l-2 border-fb-dark/30">
                        <div class="aviso-factura">
                            <strong>📄 Importante:</strong> Para facturar, adjunta tu <strong>Constancia de Situación Fiscal</strong> (PDF) en la conversación de WhatsApp.
                            <br><br>
                            <span class="text-[10px] text-fb-silver">Si aún no la tienes: <a href="https://www.sat.gob.mx" target="_blank" class="underline text-fb-dark hover:text-fb-mid">sat.gob.mx</a></span>
                        </div>
                    </div>
                </div>
            </div>
            <button onclick="enviarWhatsApp()" class="w-full bg-green-600 hover:bg-green-500 text-white font-black py-5 rounded-2xl shadow-lg flex justify-center items-center gap-3 text-lg uppercase tracking-tight transition-all transform active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Generar Pedido por WhatsApp
            </button>
            <button onclick="toggleCarrito()" class="w-full text-fb-silver text-[10px] font-black uppercase tracking-widest mt-4 hover:text-fb-dark transition-colors">Seguir Navegando</button>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRzHiWJNnKpPcOCZ6DlNONaI1xEo0BYJVUYn3hPMJFRBQVnZ98Tmzj36U9aEWR_TBlRVkGVwe3xyz8R/pub?gid=0&single=true&output=csv';
        const WHATSAPP_NUM = '5219983210480';
        let carrito = [];
        let todosLosProductos = [];
        let filtrosActivos = new Set(['todos']);

        function parseCSVLine(line) {
            const result = []; let current = ''; let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const c = line[i];
                if (inQuotes) {
                    if (c === '"' && line[i+1] === '"') { current += '"'; i++; }
                    else if (c === '"') inQuotes = false;
                    else current += c;
                } else {
                    if (c === '"') inQuotes = true;
                    else if (c === ',') { result.push(current.trim()); current = ''; }
                    else current += c;
                }
            }
            result.push(current.trim());
            return result;
        }

        function limpiarCelda(v) {
            if (!v) return '';
            v = v.replace(/^"+|"+$/g, '').trim();
            const m = v.match(/^=?HYPERLINK\s*\(\s*"([^"]+)"/i);
            return m ? m[1] : v;
        }

        async function cargarProductos() {
            try {
                const res = await fetch(SHEET_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.text();
                const filas = data.split(/\r?\n/).slice(1);
                todosLosProductos = [];
                const ozSet = new Set();
                filas.forEach((fila, idx) => {
                    if (!fila.trim()) return;
                    try {
                        const col = parseCSVLine(fila);
                        if (col.length < 5) return;
                        const p = {
                            sku: limpiarCelda(col[0]), nombre: limpiarCelda(col[1]),
                            precio: limpiarCelda(col[2]), imagenUrl: limpiarCelda(col[3]),
                            capacidad: limpiarCelda(col[4]), estatus: limpiarCelda(col[5]),
                            oferta: limpiarCelda(col[6]), link3dRaw: limpiarCelda(col[7]),
                        };
                        p.link3d = p.link3dRaw ? `https://skfb.ly/${p.link3dRaw}` : '';
                        p.precioNum = parseFloat(p.precio) || 0;
                        todosLosProductos.push(p);
                        if (p.capacidad) ozSet.add(p.capacidad);
                    } catch (e) { console.error(`Error fila ${idx+2}:`, e); }
                });
                generarChips(ozSet);
                renderizarProductos();
            } catch (e) {
                console.error('Error:', e);
                document.getElementById('catalogo').innerHTML = '<div class="col-span-full text-center py-20 text-red-500 font-bold">Error al conectar con el inventario.</div>';
            }
        }

        function generarChips(ozSet) {
            const cont = document.getElementById('contenedor-chips');
            const label = cont.querySelector('span');
            const todosBtn = cont.querySelector('[data-oz="todos"]');
            cont.innerHTML = '';
            cont.appendChild(label);
            cont.appendChild(todosBtn);
            Array.from(ozSet).sort((a, b) => (parseInt(a)||0) - (parseInt(b)||0)).forEach(oz => {
                const chip = document.createElement('button');
                chip.className = 'chip-filtro inactive';
                chip.dataset.oz = oz;
                chip.textContent = oz;
                chip.onclick = () => toggleFiltro(chip);
                cont.appendChild(chip);
            });
        }

        function toggleFiltro(chip) {
            const oz = chip.dataset.oz;
            if (oz === 'todos') { filtrosActivos.clear(); filtrosActivos.add('todos'); }
            else {
                filtrosActivos.delete('todos');
                filtrosActivos.has(oz) ? filtrosActivos.delete(oz) : filtrosActivos.add(oz);
                if (filtrosActivos.size === 0) filtrosActivos.add('todos');
            }
            document.querySelectorAll('.chip-filtro').forEach(c => {
                c.className = `chip-filtro ${filtrosActivos.has(c.dataset.oz) ? 'active' : 'inactive'}`;
            });
            renderizarProductos();
        }

        function renderizarProductos() {
            const cont = document.getElementById('catalogo');
            cont.innerHTML = '';
            const lista = filtrosActivos.has('todos') ? todosLosProductos : todosLosProductos.filter(p => filtrosActivos.has(p.capacidad));
            if (!lista.length) { cont.innerHTML = '<div class="col-span-full text-center py-20 text-fb-silver font-bold">No hay productos con ese filtro.</div>'; return; }

            lista.forEach(p => {
                const isAgotado = p.estatus.toLowerCase().includes('agotado');
                const isUltimas = p.estatus.toLowerCase().includes('últimas') || p.estatus.toLowerCase().includes('ultimas');
                const safeNombre = p.nombre.replace(/'/g, "\\'");
                const safeImg = p.imagenUrl.replace(/'/g, "\\'");

                const overlayAgotado = isAgotado ? `<div class="absolute inset-0 bg-black/70 flex justify-center items-center z-30 p-2"><span class="text-white text-xl md:text-2xl font-black uppercase text-center">¡AGOTADO!</span></div>` : '';
                const badgeOferta = (p.oferta && !isAgotado) ? `<div class="oferta-tag">${p.oferta}</div>` : '';
                const badgeUltimas = (isUltimas && !isAgotado) ? `<p class="badge-ultimas mt-1">⚠️ Últimas piezas</p>` : '';
                const badge3D = (p.link3d && !isAgotado) ? `<button class="badge-3d" onclick="event.stopPropagation(); window.open('${p.link3d.replace(/'/g,"\\'")}','_blank')" title="Ver modelo 3D"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 7.5l-9-5.25L3 7.5m18 0l-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9"/></svg>VER 3D</button>` : '';

                cont.innerHTML += `
                <div class="group relative bg-white border border-fb-light rounded-2xl overflow-hidden flex flex-col transition-all hover:border-fb-mid hover:shadow-xl ${isAgotado ? 'producto-agotado' : ''}">
                    <div class="h-44 md:h-56 bg-fb-cream overflow-hidden relative ${!isAgotado ? 'cursor-zoom-in' : ''}" onclick="${!isAgotado ? `abrirImagen('${safeImg}','${safeNombre}')` : ''}">
                        ${overlayAgotado}${badgeOferta}${badge3D}
                        <img src="${p.imagenUrl}" alt="${p.nombre}" onerror="this.src='https://via.placeholder.com/400?text=FB+Drinkware'" class="w-full h-full object-cover transform transition-transform duration-500 ${!isAgotado ? 'group-hover:scale-110' : ''}" loading="lazy">
                        ${!isAgotado ? `<div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center z-10"><svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white/80" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/></svg></div>` : ''}
                    </div>
                    <div class="p-4 md:p-5 flex-grow flex flex-col">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[8px] md:text-[9px] font-mono text-fb-silver font-bold uppercase tracking-widest">${p.sku}</span>
                            <span class="text-[8px] md:text-[9px] font-mono text-fb-dark font-bold uppercase">${p.capacidad}</span>
                        </div>
                        <h3 class="font-bold text-xs md:text-sm text-fb-dark uppercase italic mb-1 leading-tight">${p.nombre}</h3>
                        ${badgeUltimas}
                        <div class="flex items-center justify-between mt-auto pt-4 border-t border-fb-light/50 mt-4">
                            <span class="text-lg md:text-xl font-black text-fb-dark">$${p.precio}</span>
                            <button onclick="agregar('${p.sku}','${safeNombre}',${p.precioNum})" class="bg-fb-dark text-white text-[9px] md:text-[10px] font-black px-4 py-2 rounded-xl hover:bg-fb-mid transition-all transform active:scale-95 ${isAgotado ? 'hidden' : ''}">+ AÑADIR</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        function abrirImagen(url, nombre) {
            document.getElementById('imagen-ampliada').src = url;
            document.getElementById('imagen-ampliada').alt = nombre;
            document.getElementById('modal-imagen').classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        function cerrarImagen() { document.getElementById('modal-imagen').classList.remove('show'); document.body.style.overflow = ''; }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarImagen(); });

        function agregar(sku, nombre, precio) {
            const i = carrito.findIndex(x => x.sku === sku);
            if (i > -1) carrito[i].cant++; else carrito.push({ sku, nombre, precio, cant: 1 });
            actualizarInterfaz();
            const el = document.getElementById('cart-count');
            el.classList.add('scale-125'); setTimeout(() => el.classList.remove('scale-125'), 200);
        }

        function actualizarInterfaz() {
            document.getElementById('cart-count').innerText = carrito.reduce((s, i) => s + i.cant, 0);
            const lista = document.getElementById('lista-carrito');
            const subCont = document.getElementById('subtotal-container');
            if (!carrito.length) {
                lista.innerHTML = '<p class="text-center py-10 text-fb-silver text-[10px] font-bold uppercase tracking-widest">AÚN NO HAS AÑADIDO PRODUCTOS</p>';
                subCont.classList.add('hidden'); return;
            }
            let subtotal = 0;
            lista.innerHTML = carrito.map((item, idx) => {
                const t = item.precio * item.cant; subtotal += t;
                return `<div class="flex justify-between items-center bg-fb-cream p-4 rounded-2xl border border-fb-light">
                    <div class="text-[11px] font-bold flex-1 min-w-0 mr-3">
                        <span class="text-fb-dark font-mono text-[10px]">${item.sku}</span><br>
                        <span class="uppercase text-fb-mid">${item.nombre}</span><br>
                        <span class="text-fb-silver text-[10px]">$${item.precio} c/u · <strong class="text-fb-dark">$${t.toLocaleString()}</strong></span>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <button onclick="cambiarCant(${idx},-1)" class="text-fb-silver hover:text-fb-dark bg-white w-7 h-7 rounded-lg flex items-center justify-center text-sm font-black border border-fb-light">−</button>
                        <input type="number" class="cant-input" value="${item.cant}" min="1" onchange="setCant(${idx},this.value)" onclick="this.select()">
                        <button onclick="cambiarCant(${idx},1)" class="text-fb-silver hover:text-fb-dark bg-white w-7 h-7 rounded-lg flex items-center justify-center text-sm font-black border border-fb-light">+</button>
                        <button onclick="eliminar(${idx})" class="text-fb-silver hover:text-red-500 transition-colors ml-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                </div>`;
            }).join('');
            subCont.classList.remove('hidden');
            document.getElementById('subtotal-monto').textContent = `$${subtotal.toLocaleString()}`;
        }

        function setCant(idx, val) { const n = parseInt(val); if (isNaN(n) || n <= 0) carrito.splice(idx, 1); else carrito[idx].cant = n; actualizarInterfaz(); }
        function cambiarCant(idx, d) { carrito[idx].cant += d; if (carrito[idx].cant <= 0) carrito.splice(idx, 1); actualizarInterfaz(); }
        function eliminar(idx) { carrito.splice(idx, 1); actualizarInterfaz(); }
        function toggleCarrito() { document.getElementById('modal-carrito').classList.toggle('hidden'); }
        function togglePersonalizacion() { document.getElementById('opciones-logo').style.display = document.getElementById('check-personalizar').checked ? 'block' : 'none'; }
        function toggleFactura() { document.getElementById('aviso-factura').style.display = document.getElementById('check-factura').checked ? 'block' : 'none'; }

        function enviarWhatsApp() {
            if (!carrito.length) return alert('El carrito está vacío.');
            const nom = document.getElementById('form-nombre').value.trim();
            const tel = document.getElementById('form-telefono').value.trim();
            const cp = document.getElementById('form-cp').value.trim();
            if (!nom) return alert('Ingresa tu nombre.');
            if (!tel) return alert('Ingresa tu teléfono.');
            if (!cp) return alert('Ingresa tu Código Postal.');
            const pers = document.getElementById('check-personalizar').checked;
            const logo = document.querySelector('input[name="logo-tipo"]:checked')?.value || 'N/A';
            const noms = document.getElementById('check-nombres').checked;
            const fact = document.getElementById('check-factura').checked;
            let sub = 0;
            let msg = '🚀 *NUEVO PEDIDO: FB DRINKWARE* 🚀\n\n';
            msg += '👤 *DATOS DEL CLIENTE:*\n• Nombre: ' + nom + '\n• Teléfono: ' + tel + '\n📍 *CP:* ' + cp + '\n\n';
            msg += '*DETALLE DE PRODUCTOS:*\n```\nSKU        | CANT | P.UNIT | PRODUCTO\n--------------------------------------\n';
            carrito.forEach(i => {
                sub += i.precio * i.cant;
                msg += `${i.sku.padEnd(10)} | ${String(i.cant).padStart(4)} | ${('$'+i.precio).padStart(6)} | ${i.nombre}\n`;
            });
            msg += '--------------------------------------\n';
            msg += `SUBTOTAL:  $${sub.toLocaleString()}\n`;
            msg += '```\n_*No incluye personalización ni envío_\n\n';
            msg += '✨ *PERSONALIZACIÓN:*\n• Grabado: ' + (pers ? 'SÍ ✅' : 'NO ❌') + '\n';
            if (pers) msg += '• Logo: ' + logo + '\n';
            msg += '• Nombres: ' + (noms ? 'SÍ ✅' : 'NO ❌') + '\n';
            msg += '\n🧾 *FACTURACIÓN:*\n• Factura: ' + (fact ? 'SÍ ✅' : 'NO ❌') + '\n';
            if (fact) msg += '📎 _Adjuntaré mi Constancia de Situación Fiscal._\n';
            msg += '\n¿Me confirman disponibilidad y costo total?';
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        cargarProductos();
    </script>
</body>
</html>
